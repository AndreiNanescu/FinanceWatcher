name: CI

on:
  # pull_request is develop-only: promote PRs into main show the already-green
  # push-run checks on the same head SHA, so a second identical run would be
  # pure duplication. Merge commits on both branches are validated by push.
  pull_request:
    branches:
      - develop
  # Filtered to the integration branches only: feature-branch pushes trigger
  # nothing here (their open PR covers them), while merge commits — new SHAs
  # no PR check ever ran on — get validated.
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run MyPy
        # PYTHONUTF8 keeps mypy from dying on non-ASCII output via Windows
        # consoles (harmless on ubuntu; saves local runs a cryptic crash).
        env:
          PYTHONUTF8: "1"
        run: uv run mypy .

      - name: Smoke test
        run: |
          PYTHONPATH=.. uv run python -c "
          import backend.api.app
          import backend.data_pipeline
          print('Smoke test passed')
          "

  tests:
    name: Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # CI=true is set by Actions, so CRA treats lint warnings as errors —
      # verified passing locally before this job was added.
      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t financewatcher .